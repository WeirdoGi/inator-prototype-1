// ── Supabase collaboration ────────────────────────────────────
const syncStatusEl = document.getElementById('sync-status');
const boardIdInput = document.getElementById('board-id-input');
const boardJoinBtn = document.getElementById('board-join-btn');

// Unique ID for this browser tab — used to ignore our own realtime echoes
const CLIENT_ID = Math.random().toString(36).slice(2, 10);
let lastSaveTime = 0; // timestamp of our last save — ignore echoes within 3s

function setSyncStatus(msg, color) {
  syncStatusEl.textContent = msg;
  syncStatusEl.style.color = color || 'var(--muted)';
}

// Generate a short random board ID
function generateBoardId() {
  return Math.random().toString(36).slice(2, 8).toUpperCase();
}

// Save current state to Supabase
async function saveToSupabase() {
  if (!sbClient || !boardId || isSyncing) return;
  lastSaveTime = Date.now(); // record when WE saved
  const state = {
    id:         boardId,
    screens:    screens,
    drawings:   drawingHistory,
    client_id:  CLIENT_ID,  // tag so we can identify our own saves
    updated_at: new Date().toISOString()
  };
  const { error } = await sbClient.from('boards').upsert(state);
  if (error) {
    console.warn('Supabase save error:', error.message);
    setSyncStatus('save error', 'var(--accent2)');
  } else {
    setSyncStatus('synced ✓', '#44cc77');
    setTimeout(() => setSyncStatus('connected', '#44cc77'), 1500);
  }
}

// Load state from Supabase and apply it
async function loadFromSupabase(id) {
  if (!sbClient) return false;
  const { data, error } = await sbClient.from('boards').select('*').eq('id', id).single();
  if (error || !data) return false;
  isSyncing = true;
  screens       = data.screens  || { 1: [], 2: [] };
  drawingHistory = data.drawings || {};
  // Make sure active screen exists
  if (!screens[activeScreen]) activeScreen = parseInt(Object.keys(screens)[0]) || 1;
  // Recalculate nextId to avoid ID collisions
  let maxId = 0;
  Object.values(screens).forEach(els => els.forEach(e => { if (e.id > maxId) maxId = e.id; }));
  nextId = maxId + 1;
  renderTabs();
  renderElements();
  isSyncing = false;
  return true;
}

// Subscribe to realtime changes
function subscribeToBoard(id) {
  if (!sbClient) return;
  if (realtimeChannel) { sbClient.removeChannel(realtimeChannel); realtimeChannel = null; }

  realtimeChannel = sbClient.channel('board-' + id)
    .on('postgres_changes', {
      event:  '*',
      schema: 'public',
      table:  'boards',
      filter: `id=eq.${id}`
    }, (payload) => {
      if (isSyncing) return;
      const data = payload.new;
      if (!data) return;

      // Ignore our own echoes — if this save came from us (same CLIENT_ID)
      // or arrived within 3 seconds of our last save, skip it
      if (data.client_id === CLIENT_ID) return;
      if (Date.now() - lastSaveTime < 3000) return;

      // This is a genuine change from another client — apply it
      isSyncing = true;
      screens        = data.screens  || screens;
      drawingHistory = data.drawings || drawingHistory;
      if (!screens[activeScreen]) activeScreen = parseInt(Object.keys(screens)[0]) || 1;
      let maxId = 0;
      Object.values(screens).forEach(els => els.forEach(e => { if (e.id > maxId) maxId = e.id; }));
      nextId = maxId + 1;
      renderTabs();
      renderElements();
      isSyncing = false;
      setSyncStatus('updated ↓', '#5b4de0');
      setTimeout(() => setSyncStatus('connected', '#44cc77'), 1000);
    })
    .subscribe((status) => {
      if (status === 'SUBSCRIBED') {
        setSyncStatus('connected', '#44cc77');
        addLog(`Connected to board "${id}" — share this ID to collaborate`, 'info');
      }
    });
}

// Join or create a board session
async function joinBoard(id) {
  if (!sbClient && !initSupabase()) {
    setSyncStatus('offline — no sync', '#e8335a');
    addLog('Supabase not ready yet — try again in a moment', 'error');
    return;
  }
  boardId = id.trim().toUpperCase();
  boardIdInput.value = boardId;
  setSyncStatus('connecting…', 'var(--accent)');

  const existed = await loadFromSupabase(boardId);
  if (existed) {
    addLog(`Loaded board "${boardId}"`, 'info');
  } else {
    // New board — save current state
    await saveToSupabase();
    addLog(`Created new board "${boardId}"`, 'info');
  }
  subscribeToBoard(boardId);
}

// Join button
boardJoinBtn.onclick = () => {
  const id = boardIdInput.value.trim();
  if (!id) return;
  joinBoard(id);
};
boardIdInput.addEventListener('keydown', e => { if (e.key === 'Enter') boardJoinBtn.click(); });

// Auto-save whenever state changes — debounced so it doesn't fire on every pixel drag
let saveTimer = null;
function scheduleSave() {
  if (!boardId) return;
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveToSupabase, 600);
}

// Hook scheduleSave into renderElements so every change auto-saves
const _origRenderElements = renderElements;
renderElements = function() {
  _origRenderElements();
  scheduleSave();
};

// Auto-create and join a board on load so you always have a session
// Wait for Supabase library to load first (up to 5 retries)
function tryAutoJoin(attempts) {
  if (initSupabase()) {
    const autoId = generateBoardId();
    boardIdInput.value = autoId;
    joinBoard(autoId);
  } else if (attempts > 0) {
    setTimeout(() => tryAutoJoin(attempts - 1), 800);
  } else {
    setSyncStatus('offline (no sync)', '#e8335a');
    addLog('Supabase library failed to load — collaboration unavailable, but whiteboard still works', 'error');
  }
}
setTimeout(() => tryAutoJoin(5), 1000);

// ── Init ───────────────────────────────────────────────────────
renderTabs();
renderElements();
addLog('Ready. Enter your Anthropic API key above to start.', 'info');
addLog('Click 🎤 to activate wake word — say "Hey Wall …command… Send it"', 'info');
</script>
